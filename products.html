<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Same head as index.html -->
  <title>Diagnos Pharmacy - Nos Produits</title>
</head>
<body>
  <!-- Reuse header from index.html -->
  <header>
    <!-- ... -->
  </header>

  <main class="products-page">
    <section class="product-filters">
      <div class="container">
        <h2>Filtrer les produits</h2>
        <div class="filter-options">
          <select id="category-filter">
            <option value="all">Toutes catégories</option>
            <option value="medicaments">Médicaments</option>
            <option value="soins">Soins de la peau</option>
          </select>
          <input type="text" id="search-products" placeholder="Rechercher...">
        </div>
      </div>
    </section>

    <section class="all-products">
      <div class="container">
        <div class="products-grid">
          <!-- Repeat this card for each product -->
          <div class="product-card" data-category="medicaments">
            <img src="path/to/product.jpg" alt="Product Name">
            <h3>Nom du Produit</h3>
            <p class="price">€19.99</p>
            <button class="btn btn-primary add-to-cart">Ajouter au panier</button>
          </div>
        </div>
        <div class="pagination">
          <a href="#" class="btn btn-outline">Précédent</a>
          <span>Page 1 sur 5</span>
          <a href="#" class="btn btn-outline">Suivant</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Reuse footer from index.html -->
  <footer>
    <!-- ... -->
  </footer>

  <script src="scripts/products.js"></script>
</body>
</html>
