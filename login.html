<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Diagnos Pharmacy</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<main class="auth-page">
  <div class="auth-box">

    <a href="index.html" class="logo">Diagnos<span>Pharmacy</span></a>

    <h1>Connexion</h1>
    <p>Connectez-vous pour continuer</p>

    <div id="login-error" class="form-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="ex: user@email.com" required>
      </div>

      <div class="form-group">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" placeholder="Votre mot de passe" required>
      </div>

      <button type="submit" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i> Se connecter
      </button>
    </form>

    <p class="auth-link">
      Pas encore de compte ?
      <a href="register.html">Créer un compte</a>
    </p>

    <p class="auth-link">
      Accès administrateur ?
      <a href="admin-login.html">Connexion admin</a>
    </p>

    <p class="auth-link">
      <a href="index.html">Retour à l'accueil</a>
    </p>

  </div>
</main>

<script type="module" src="auth.js"></script>

</body>
</html>
