<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- ... -->
  <title>Diagnos Pharmacy - Détails du Produit</title>
</head>
<body>
  <header><!-- ... --></header>

  <main class="product-detail">
    <div class="container">
      <div class="product-detail-grid">
        <div class="product-gallery">
          <img src="path/to/main-product.jpg" class="main-image" alt="Product">
          <div class="thumbnails">
            <img src="path/to/thumbnail1.jpg" alt="Thumbnail 1">
            <img src="path/to/thumbnail2.jpg" alt="Thumbnail 2">
          </div>
        </div>
        <div class="product-info">
          <h1>Nom du Produit</h1>
          <p class="price">€24.99</p>
          <div class="product-meta">
            <span>Catégorie: Soins de la peau</span>
            <span>En stock: 15 unités</span>
          </div>
          <div class="product-actions">
            <div class="quantity-selector">
              <button class="qty-btn minus">-</button>
              <input type="number" value="1" min="1">
              <button class="qty-btn plus">+</button>
            </div>
            <button class="btn btn-primary add-to-cart">Ajouter au panier</button>
          </div>
          <div class="product-description">
            <h3>Description</h3>
            <p>Detailed product description...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer><!-- ... --></footer>

  <script src="scripts/product-detail.js"></script>
</body>
</html>
